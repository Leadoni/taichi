name: Preview funnel (devBob) to Cloudflare Pages

# Publishes the devBob branch to a PREVIEW url (e.g. https://devbob.taimotion.pages.dev)
# so work can be eyeballed before it goes to production. Production (taimotion.com)
# only ever deploys from main via deploy.yml — this never touches it.
on:
  push:
    branches: [devBob]
  workflow_dispatch:

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Stage site (funnel only; no source/docs)
        run: |
          mkdir -p _site
          rsync -a \
            --exclude='.git' --exclude='.github' \
            --exclude='docs' --exclude='supabase' \
            --exclude='node_modules' --exclude='.wrangler' \
            --exclude='_site' \
            ./ _site/
      - name: Deploy to Cloudflare Pages (preview branch=devBob)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy _site --project-name=taimotion --branch=devBob
